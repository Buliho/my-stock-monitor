name: Daily Winbond Margin Notify

on:
  schedule:
    # 每天下午 5:00 執行 (台北時間 UTC+8，故設定 UTC 09:00)
    - cron: '0 9 * * 1-5'
  workflow_dispatch: # 允許您在 Actions 頁面手動點擊執行測試

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run Margin Notify Script
        env:
          # 這裡必須與您 GitHub Secrets 裡設定的名稱完全一致
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        run: python margin_notify.py
