name: Daily Stock Monitor

on:
  schedule:
    - cron: '32 0 * * *' # 台灣 08:32
    - cron: '0 8 * * *'  # 台灣 16:00
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          # 1. 安裝系統組件 (解決截圖閃退)
          sudo apt-get update
          sudo apt-get install -y libnss3 libatk-bridge2.0-0 libxcomposite1 libxdamage1 libxrandr2 libgbm1
          
          # 2. 強制安裝所有必要套件 (解決 yfinance 缺失)
          pip install requests selenium webdriver-manager yfinance pandas pandas_ta
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Appropriate Script
        env:
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
        run: |
          HOUR=$(date +%H)
          echo "目前的 UTC 小時為: $HOUR"
          
          # 判斷：如果是台灣早上 8 點 (UTC 00) 或下午 4 點 (UTC 08)
          if [ "$HOUR" -eq "00" ] || [ "$HOUR" -eq "08" ]; then
            echo "啟動台股籌碼抓圖任務..."
            python chart_pusher.py
          else
            echo "執行美股掃描任務..."
            python main.py
          fi
