name: Daily Stock Monitor

on:
  schedule:
    # 台灣清晨 05:00 (美股收盤訊號)
    - cron: '32 0 * * *'
    # 台灣下午 16:00 (抓取台股多空比圖表) -> UTC 08:00
    - cron: '32 0 * * *'
  workflow_dispatch: # 允許您在 Actions 頁面手動點擊 Run workflow 測試

env:
  # 解決 Node.js 版本過時警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          # 1. 更新系統並安裝 Chrome 執行所需的底層組件，避免 Selenium 崩潰
          sudo apt-get update
          sudo apt-get install -y libnss3 libatk-bridge2.0-0 libxcomposite1 libxdamage1 libxrandr2 libgbm1
          
          # 2. 安裝 Python 套件
          pip install -r requirements.txt
          pip install selenium webdriver-manager requests

      - name: Run Appropriate Script
        env:
          # 請確保 GitHub Secrets 裡的名稱完全符合 LINE_ACCESS_TOKEN
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
        run: |
          # 取得目前 UTC 小時數來判斷要跑哪一個程式
          HOUR=$(date +%H)
          if [ "$HOUR" -eq "08" ]; then
            echo "目前為台灣下午時段，啟動台股籌碼抓圖任務..."
            python chart_pusher.py
          else
            echo "目前為清晨時段，啟動美股掃描任務..."
            python main.py
          fi
