name: Daily Stock Monitor

on:
  schedule:
    # 台灣上午 08:32 (UTC 00:32)
    - cron: '41 0 * * *'
    # 台灣下午 16:00 (UTC 08:00)
    - cron: '0 8 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Chrome browser  # <-- 新增這個 step
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install dependencies
        run: |
          sudo apt-get install -y libnss3 libatk-bridge2.0-0 libxcomposite1 libxdamage1 libxrandr2 libgbm1
          pip install requests selenium webdriver-manager

      - name: Run Appropriate Script
        env:
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
        run: |
          HOUR=$(date +%H)

          if [ "$HOUR" -eq "00" ] || [ "$HOUR" -eq "08" ]; then
            echo "目前時段符合，啟動台股零碎抓圖任務..."
            python chart_pusher.py
          else
            echo "目前為滿震或其他時段，執行關股掃描任務..."
            python main.py
          fi
