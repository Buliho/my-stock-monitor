name: Daily Stock Monitor

on:
  schedule:
    # 1. 台灣清晨 05:32 (UTC 21:32) - 執行美股收盤後數據 (main.py)
    - cron: '32 21 * * *'
    
    # 2. 美股盤中監控：每小時整點執行一次 (UTC 14:00 - 20:00，週一至週五)
    # 對應台灣時間約為 22:00 - 04:00
    - cron: '0 14-20 * * 1-5'

  workflow_dispatch: # 允許手動測試

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests yfinance pandas pandas_ta

      # 邏輯判斷：如果是 UTC 21:32 (收盤時間) 才跑 main.py
      - name: Run Main Stock Monitor (收盤提醒)
        if: github.event.schedule == '32 21 * * *' || github.event_name == 'workflow_dispatch'
        run: python main.py

      # 邏輯判斷：如果是每整點 (盤中監控) 才跑 stock_group_monitor.py
      - name: 執行族群動態監控 (類比IC車用)
        if: github.event.schedule != '32 21 * * *' || github.event_name == 'workflow_dispatch'
        run: python stock_group_monitor.py
